<!DOCTYPE html>
<html>
<head>
    <title>Book Lover</title>
    <link rel="stylesheet" href="style1.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div id="main">
    <div class="overlay"></div>

    <div class="content">

        <div class="top-icon">
            <span class="line"></span>
            <i class="material-icons">menu_book</i>
            <span class="line"></span>
        </div>

        <h1>BOOKS ARE A <br> JOURNEY OF THE MIND</h1>

        <div class="small-line"></div>

        <p class="tagline">Read more, learn more, grow more.</p>

        <div class="heart-line">
            <span></span>
            ❤
            <span></span>
        </div>

        <p class="quote">
            A book is a dream that you hold <br>
            in your hands.
        </p>

        <div class="cards">

            <div class="card">
                <i class="material-icons">menu_book</i>
                <h3>READ</h3>
                <p>Discover new worlds.</p>
            </div>

            <div class="card">
                <i class="material-icons">school</i>
                <h3>LEARN</h3>
                <p>Gain new knowledge.</p>
            </div>

            <div class="card">
                <i class="material-icons">favorite</i>
                <h3>LOVE</h3>
                <p>Fall in love with reading.</p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
